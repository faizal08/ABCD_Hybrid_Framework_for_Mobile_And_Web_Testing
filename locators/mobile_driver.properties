# Native Permission Dialogs and Welcome Flow Elements
mobile.driver.permission_allow.btn=id=com.android.permissioncontroller:id/permission_allow_button
mobile.driver.agree.btn=accessibility=Agree
mobile.driver.get_started.btn=accessibility=Get Started
mobile.driver.next.btn=accessibility=Next

# Authentication Registration Inputs
mobile.driver.mobile_number_field.btn=accessibility=Mobile Number
mobile.driver.cancel.btn=accessibility=Cancel
mobile.driver.edit_text.input=automator=new UiSelector().className("android.widget.EditText")
mobile.driver.continue.btn=accessibility=Continue
mobile.driver.location_allow.btn=id=com.android.permissioncontroller:id/permission_allow_foreground_only_button

# Onboarding Terms and Checkbox Selectors
mobile.driver.independent_contractor.checkbox=//android.widget.CheckBox[contains(@content-desc,'Independent Contractor')]
mobile.driver.legal_document.checkbox=//android.widget.CheckBox[contains(@content-desc,'Legal & Document')]
mobile.driver.safety_conduct.checkbox=//android.widget.CheckBox[contains(@content-desc,'Safety & Code')]
mobile.driver.subscription_model.checkbox=//android.widget.CheckBox[contains(@content-desc,'Subscription Model')]
mobile.driver.liability.checkbox=//android.widget.CheckBox[contains(@content-desc,'Liability & Indemnity')]
mobile.driver.data_protection.checkbox=//android.widget.CheckBox[contains(@content-desc,'Data Protection')]
mobile.driver.fitness_declaration.checkbox=//android.widget.CheckBox[contains(@content-desc,'Fitness Declaration')]
mobile.driver.confirmation.checkbox=//android.widget.CheckBox[contains(@content-desc,'Final Confirmation')]
mobile.driver.agree_continue.btn=//android.widget.Button[@content-desc="AGREE & CONTINUE"]

# App Application Framework Structural Targets
mobile.driver.app_header.label=accessibility=Driver App
mobile.driver.documents.menu=accessibility=Documents
mobile.driver.add_documents.header=accessibility=Add Documents
mobile.driver.back.btn=accessibility=Back

# Document Interaction and Verification Controls
mobile.driver.upload.btn=accessibility=Upload
mobile.driver.upload_docs.btn=accessibility=Upload Documents
mobile.driver.crop.btn=accessibility=Crop

# System Android File Picker Handlers
mobile.driver.android_content.view=automator=new UiSelector().resourceId("com.google.android.documentsui:id/content").instance(0)
mobile.driver.sort_modified.btn=automator=new UiSelector().text("Modified (newest first)")
mobile.driver.license_thumb.icon=id=com.google.android.documentsui:id/icon_thumb

# System DatePicker Calendar Utilities
mobile.driver.next_month.btn=accessibility=Next month
mobile.driver.ok.btn=accessibility=OK

