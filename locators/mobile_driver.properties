# Ride Dispatch & Acceptance
mobile.driver.auto_ride_notification.label=accessibility=Auto Ride
mobile.driver.on_my_way.btn=accessibility=On My Way to Pickup

# Trip Progress States
mobile.driver.arrived.btn=accessibility=Arrived
mobile.driver.yes.btn=accessibility=Yes
mobile.driver.start_ride.btn=accessibility=Start Ride

# OTP Verification Fields
mobile.driver.otp_view.input=automator=new UiSelector().className("android.view.View").instance(6)
mobile.driver.start.btn=accessibility=Start

